# ─── Font ────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size        12.0
font_features    JetBrainsMono-Regular +calt +liga +zero
font_features    JetBrainsMono-Bold    +calt +liga
font_features    JetBrainsMono-Italic  +calt +liga

disable_ligatures never

# ─── Cursor ──────────────────────────────────────────────────────
cursor                     #7dcfff
cursor_text_color          #1a1b26
cursor_shape               block
cursor_blink_interval      0.5
cursor_stop_blinking_after 0

# ─── Scrollback ──────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ─── Mouse ───────────────────────────────────────────────────────
mouse_hide_wait       3.0
url_color             #7aa2f7
url_style             curly
open_url_with         default
detect_urls           yes
copy_on_select        yes
strip_trailing_spaces smart

# ─── Performance ─────────────────────────────────────────────────
repaint_delay   8
input_delay     2
sync_to_monitor no

# ─── Transparency ────────────────────────────────────────────────
# Blur comes from blur-my-shell — kitty just sets opacity
background_opacity       0.85
dynamic_background_color yes

inactive_text_alpha 0.60
dim_opacity         0.75

# ─── Colors — Tokyo Night ────────────────────────────────────────
background  #1a1b26
foreground  #c0caf5

selection_background #364a82
selection_foreground #c0caf5

# Black
color0  #15161e
color8  #414868

# Red
color1  #f7768e
color9  #f7768e

# Green
color2  #9ece6a
color10 #9ece6a

# Yellow
color3  #e0af68
color11 #e0af68

# Blue
color4  #7aa2f7
color12 #7aa2f7

# Magenta / Purple
color5  #bb9af7
color13 #bb9af7

# Cyan
color6  #7dcfff
color14 #7dcfff

# White
color7  #a9b1d6
color15 #c0caf5

# ─── Window feel — GNOME-ish ─────────────────────────────────────
# Keep native title bar so it blends with GNOME apps
hide_window_decorations no

# Wayland client-side decorations off — let GNOME draw the chrome
wayland_titlebar_color background

# Generous padding so text never hugs the edges
window_padding_width 16

remember_window_size   yes
initial_window_width   1200
initial_window_height  700

# ─── Borders ─────────────────────────────────────────────────────
active_border_color   #7aa2f7
inactive_border_color #1f2335
bell_border_color     #f7768e
draw_minimal_borders  yes

# ─── Tabs — GNOME-ish ────────────────────────────────────────────
tab_bar_edge          top
tab_bar_style         separator
tab_separator         " ┇ "
tab_bar_min_tabs      2
tab_bar_margin_width  4
tab_bar_margin_height 4 0

active_tab_foreground   #c0caf5
active_tab_background   #1f2335
active_tab_font_style   bold
inactive_tab_foreground #565f89
inactive_tab_background #1a1b26
inactive_tab_font_style normal
tab_bar_background      #1a1b26

# ─── Bell ────────────────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0.0

# ─── Shell ───────────────────────────────────────────────────────
shell             /usr/bin/fish
editor            nvim
shell_integration enabled

# ─── Clipboard ───────────────────────────────────────────────────
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# ─── Keyboard Shortcuts ──────────────────────────────────────────
clear_all_shortcuts yes

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+s paste_from_selection

# Scrolling
map ctrl+shift+k    scroll_line_up
map ctrl+shift+j    scroll_line_down
map ctrl+shift+u    scroll_page_up
map ctrl+shift+d    scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end  scroll_end

# Tabs
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5

# Windows / splits
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+]     next_window
map ctrl+shift+[     previous_window

# Layouts
map ctrl+shift+alt+t goto_layout tall
map ctrl+shift+alt+s goto_layout stack
map ctrl+shift+alt+g goto_layout grid
map ctrl+shift+space next_layout

# Font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

# Misc
map ctrl+shift+f5  load_config_file
map ctrl+shift+f6  debug_config
map ctrl+shift+p>u kitten hints --type url

# ─── Marks ───────────────────────────────────────────────────────
mark1_foreground #1a1b26
mark1_background #7aa2f7
mark2_foreground #1a1b26
mark2_background #7dcfff
mark3_foreground #1a1b26
mark3_background #f7768e

# ─── Misc ────────────────────────────────────────────────────────
allow_remote_control    yes
update_check_interval   0
confirm_os_window_close 0
term                    xterm-kitty
close_on_child_death    no
single_instance         yes
instance_group          main

# ─── Pywal integration (optional) ────────────────────────────────
# Uncomment to let pywal override colors:
# include ~/.cache/wal/colors-kitty.conf